name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/

      - name: Type check with mypy
        run: |
          mypy src/ || true

      - name: Run tests (excluding slow parity tests)
        run: |
          pytest -q tests/ --ignore=tests/test_strengths_cache.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run parity tests (slow)
        run: |
          pytest -q tests/test_strengths_cache.py -k "not speedup" --tb=short
        env:
          PYTHONUNBUFFERED: "1"
